<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Animation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center;
        }

        #gameContainer.camera-zoom {
            animation: cameraZoom 0.5s ease-out;
        }

        #gameContainer.camera-shake {
            animation: cameraShake 0.3s ease-out;
        }

        @keyframes cameraZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes cameraShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        #victoryText {
            position: absolute;
            font-size: 4rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transform: scale(0) rotate(-180deg);
            z-index: 100;
            letter-spacing: 0.1em;
        }

        #victoryText.victory-animate {
            animation: victoryReveal 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes victoryReveal {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(10deg);
            }
            70% {
                transform: scale(0.9) rotate(-5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .glow-effect {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .glow-effect.glow-animate {
            animation: glowPulse 1.5s ease-out forwards;
        }

        @keyframes glowPulse {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(2);
            }
            100% {
                opacity: 0;
                transform: scale(3);
            }
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 200;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #configPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 200;
            max-width: 300px;
        }

        #configPanel h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .config-item {
            margin-bottom: 10px;
        }

        .config-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .config-item input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .config-item span {
            font-size: 12px;
            color: #777;
        }

        .star {
            position: absolute;
            color: #FFD700;
            font-size: 2rem;
            opacity: 0;
            animation: starBurst 1s ease-out forwards;
        }

        @keyframes starBurst {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.5) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.5) rotate(360deg) translateY(-50px);
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="particleCanvas"></canvas>
        <div id="victoryText">VICTORY!</div>
        <div class="glow-effect"></div>
    </div>

    <div id="controls">
        <button onclick="winAnimation.play()">Play Win Animation</button>
        <button onclick="winAnimation.reset()">Reset</button>
    </div>

    <div id="configPanel">
        <h3>Animation Settings</h3>
        <div class="config-item">
            <label for="duration">Animation Duration (seconds)</label>
            <input type="range" id="duration" min="2" max="4" step="0.1" value="3">
            <span id="durationValue">3.0s</span>
        </div>
        <div class="config-item">
            <label for="intensity">Effect Intensity</label>
            <input type="range" id="intensity" min="0.5" max="2" step="0.1" value="1">
            <span id="intensityValue">1.0x</span>
        </div>
        <div class="config-item">
            <label for="particleCount">Particle Count</label>
            <input type="range" id="particleCount" min="20" max="100" step="5" value="50">
            <span id="particleCountValue">50</span>
        </div>
        <div class="config-item">
            <label for="cameraEffect">Camera Effect</label>
            <select id="cameraEffect">
                <option value="zoom">Zoom</option>
                <option value="shake">Shake</option>
                <option value="both">Both</option>
            </select>
        </div>
    </div>

    <script>
        class WinAnimation {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.isAnimating = false;
                this.config = {
                    duration: 3000,
                    intensity: 1,
                    particleCount: 50,
                    cameraEffect: 'zoom'
                };
                this.sounds = {
                    victory: this.createOscillatorSound(800, 0.1, 'sine'),
                    sparkle: this.createOscillatorSound(1200, 0.05, 'triangle'),
                    boom: this.createOscillatorSound(200, 0.15, 'sawtooth')
                };
                
                this.init();
            }

            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                this.setupConfigListeners();
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            setupConfigListeners() {
                const durationSlider = document.getElementById('duration');
                const intensitySlider = document.getElementById('intensity');
                const particleCountSlider = document.getElementById('particleCount');
                const cameraEffectSelect = document.getElementById('cameraEffect');

                durationSlider.addEventListener('input', (e) => {
                    this.config.duration = parseFloat(e.target.value) * 1000;
                    document.getElementById('durationValue').textContent = `${e.target.value}s`;
                });

                intensitySlider.addEventListener('input', (e) => {
                    this.config.intensity = parseFloat(e.target.value);
                    document.getElementById('intensityValue').textContent = `${e.target.value}x`;
                });

                particleCountSlider.addEventListener('input', (e) => {
                    this.config.particleCount = parseInt(e.target.value);
                    document.getElementById('particleCountValue').textContent = e.target.value;
                });

                cameraEffectSelect.addEventListener('change', (e) => {
                    this.config.cameraEffect = e.target.value;
                });
            }

            createOscillatorSound(frequency, duration, type = 'sine') {
                return () => {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = frequency * this.config.intensity;
                    oscillator.type = type;
                    
                    gainNode.gain.setValueAtTime(0.3 * this.config.intensity, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + duration);
                };
            }

            createParticle(x, y) {
                const colors = ['#FFD700', '#FFA500', '#FF69B4', '#00CED1', '#98FB98'];
                return {
                    x: x || Math.random() * this.canvas.width,
                    y: y || Math.random() * this.canvas.height,
                    vx: (Math.random() - 0.5) * 8 * this.config.intensity,
                    vy: (Math.random() - 0.5) * 8 * this.config.intensity - 2,
                    size: Math.random() * 4 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: Math.random() * 0.015 + 0.005,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.2
                };
            }

            updateParticles() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy += 0.2;
                    particle.life -= particle.decay;
                    particle.rotation += particle.rotationSpeed;
                    
                    if (particle.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    
                    this.ctx.save();
                    this.ctx.globalAlpha = particle.life;
                    this.ctx.translate(particle.x, particle.y);
                    this.ctx.rotate(particle.rotation);
                    
                    this.ctx.fillStyle = particle.color;
                    this.ctx.fillRect(-particle.size/2, -particle.size/2, particle.size, particle.size);
                    
                    this.ctx.restore();
                }
                
                if (this.isAnimating) {
                    requestAnimationFrame(() => this.updateParticles());
                }
            }

            async play() {
                if (this.isAnimating) return;
                
                this.isAnimating = true;
                this.reset();
                
                const container = document.getElementById('gameContainer');
                const victoryText = document.getElementById('victoryText');
                const glowEffect = document.querySelector('.glow-effect');
                
                this.sounds.victory();
                
                setTimeout(() => this.sounds.sparkle(), 200);
                setTimeout(() => this.sounds.boom(), 400);
                
                if (this.config.cameraEffect === 'zoom' || this.config.cameraEffect === 'both') {
                    container.classList.add('camera-zoom');
                    setTimeout(() => container.classList.remove('camera-zoom'), 500);
                }
                
                if (this.config.cameraEffect === 'shake' || this.config.cameraEffect === 'both') {
                    setTimeout(() => {
                        container.classList.add('camera-shake');
                        setTimeout(() => container.classList.remove('camera-shake'), 300);
                    }, 300);
                }
                
                victoryText.classList.add('victory-animate');
                
                glowEffect.classList.add('glow-animate');
                setTimeout(() => glowEffect.classList.remove('glow-animate'), 1500);
                
                this.createConfetti();
                this.createStars();
                
                this.updateParticles();
                
                setTimeout(() => {
                    this.isAnimating = false;
                }, this.config.duration);
            }

            createConfetti() {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                
                for (let i = 0; i < this.config.particleCount; i++) {
                    setTimeout(() => {
                        const particle = this.createParticle(
                            centerX + (Math.random() - 0.5) * 100,
                            centerY + (Math.random() - 0.5) * 100
                        );
                        this.particles.push(particle);
                        
                        if (Math.random() > 0.7) {
                            this.sounds.sparkle();
                        }
                    }, i * 30);
                }
            }

            createStars() {
                const starSymbols = ['⭐', '✨', '🌟', '💫'];
                const container = document.getElementById('gameContainer');
                
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const star = document.createElement('div');
                        star.className = 'star';
                        star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
                        star.style.left = `${20 + Math.random() * 60}%`;
                        star.style.top = `${20 + Math.random() * 60}%`;
                        container.appendChild(star);
                        
                        setTimeout(() => star.remove(), 1000);
                    }, i * 100);
                }
            }

            reset() {
                this.particles = [];
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const container = document.getElementById('gameContainer');
                const victoryText = document.getElementById('victoryText');
                const glowEffect = document.querySelector('.glow-effect');
                
                container.classList.remove('camera-zoom', 'camera-shake');
                victoryText.classList.remove('victory-animate');
                glowEffect.classList.remove('glow-animate');
                
                document.querySelectorAll('.star').forEach(star => star.remove());
            }
        }

        const winAnimation = new WinAnimation();
    </script>
</body>
</html>
